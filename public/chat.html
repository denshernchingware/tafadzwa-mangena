<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MightyBreeze Chatbot Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sky: #0ea5e9;
    --sky-dark: #0284c7;
    --earth: #16a34a;
    --earth-dark: #15803d;
    --sand: #fef3c7;
    --ink: #0f172a;
    --ink-soft: #334155;
    --mist: #f1f5f9;
    --white: #ffffff;
    --radius: 20px;
    --radius-sm: 12px;
    --shadow: 0 24px 60px rgba(15,23,42,0.18);
  }

  body {
    /* font-family: 'DM Sans', sans-serif;
    background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f2d1f 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px; */
  }

  /* ── Demo wrapper ── */
  .demo-label {
    position: fixed;
    top: 18px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.7);
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 6px 18px;
    border-radius: 40px;
    backdrop-filter: blur(10px);
    white-space: nowrap;
  }

  /* ── FAB button ── */
  #fab {
    position: fixed;
    bottom: 32px;
    right: 32px;
    width: 62px;
    height: 62px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--sky), var(--earth));
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 32px rgba(14,165,233,0.45);
    transition: transform 0.25s cubic-bezier(.34,1.56,.64,1), box-shadow 0.25s;
    z-index: 9999;
  }
  #fab:hover { transform: scale(1.12); box-shadow: 0 12px 40px rgba(14,165,233,0.55); }
  #fab svg { width: 28px; height: 28px; transition: opacity 0.2s; }
  #fab .ico-chat { opacity: 1; position: absolute; }
  #fab .ico-close { opacity: 0; position: absolute; }
  #fab.open .ico-chat { opacity: 0; }
  #fab.open .ico-close { opacity: 1; }

  /* pulse ring */
  #fab::after {
    content: '';
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    border: 2px solid rgba(14,165,233,0.4);
    animation: pulse 2.2s ease-out infinite;
  }
  @keyframes pulse {
    0% { transform: scale(1); opacity: 1; }
    70% { transform: scale(1.4); opacity: 0; }
    100% { transform: scale(1.4); opacity: 0; }
  }

  /* ── Chat window ── */
  #chat-window {
    position: fixed;
    bottom: 108px;
    right: 32px;
    width: 380px;
    max-height: 600px;
    border-radius: var(--radius);
    background: var(--white);
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    z-index: 9998;
    transform: scale(0.88) translateY(20px);
    opacity: 0;
    pointer-events: none;
    transform-origin: bottom right;
    transition: transform 0.3s cubic-bezier(.34,1.56,.64,1), opacity 0.25s;
  }
  #chat-window.open {
    transform: scale(1) translateY(0);
    opacity: 1;
    pointer-events: all;
  }

  /* header */
  .chat-header {
    background: linear-gradient(120deg, var(--ink) 0%, #1e3a5f 100%);
    padding: 18px 20px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .chat-avatar {
    width: 42px; height: 42px; border-radius: 50%;
    background: linear-gradient(135deg, var(--sky), var(--earth));
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .chat-avatar svg { width: 22px; height: 22px; }
  .chat-header-info { flex: 1; }
  .chat-header-name {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 15px;
    color: var(--white);
    line-height: 1.2;
  }
  .chat-header-status {
    font-size: 12px;
    color: rgba(255,255,255,0.55);
    display: flex;
    align-items: center;
    gap: 5px;
    margin-top: 2px;
  }
  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #4ade80;
    animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* messages area */
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 18px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    background: #f8fafc;
    scroll-behavior: smooth;
  }
  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-track { background: transparent; }
  .chat-messages::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

  /* message bubbles */
  .msg {
    display: flex;
    gap: 8px;
    align-items: flex-end;
    animation: msgIn 0.3s cubic-bezier(.34,1.56,.64,1) both;
  }
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(10px) scale(0.95); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  .msg.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 28px; height: 28px; border-radius: 50%;
    background: linear-gradient(135deg, var(--sky), var(--earth));
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .msg-avatar svg { width: 14px; height: 14px; }

  .bubble {
    max-width: 80%;
    padding: 10px 14px;
    border-radius: 18px;
    font-size: 13.5px;
    line-height: 1.55;
    color: var(--ink);
  }
  .msg.bot .bubble {
    background: var(--white);
    border-bottom-left-radius: 5px;
    box-shadow: 0 2px 8px rgba(15,23,42,0.08);
  }
  .msg.user .bubble {
    background: linear-gradient(135deg, var(--sky-dark), var(--sky));
    color: white;
    border-bottom-right-radius: 5px;
  }

  /* quick replies */
  .quick-replies {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
    margin-top: 4px;
    padding-left: 36px;
    animation: msgIn 0.35s 0.1s cubic-bezier(.34,1.56,.64,1) both;
  }
  .qr {
    background: white;
    border: 1.5px solid var(--sky);
    color: var(--sky-dark);
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    padding: 5px 12px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.18s;
    white-space: nowrap;
  }
  .qr:hover {
    background: var(--sky);
    color: white;
    border-color: var(--sky);
    transform: translateY(-1px);
  }

  /* typing indicator */
  .typing-indicator {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }
  .typing-dots {
    background: white;
    border-radius: 18px;
    border-bottom-left-radius: 5px;
    padding: 12px 16px;
    display: flex;
    gap: 5px;
    box-shadow: 0 2px 8px rgba(15,23,42,0.08);
  }
  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #94a3b8;
    animation: dotBounce 1.2s ease-in-out infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.15s; }
  .dot:nth-child(3) { animation-delay: 0.3s; }
  @keyframes dotBounce {
    0%,60%,100% { transform: translateY(0); }
    30% { transform: translateY(-6px); background: var(--sky); }
  }

  /* input bar */
  .chat-input-bar {
    padding: 14px 14px 14px;
    background: white;
    border-top: 1px solid #e2e8f0;
    display: flex;
    gap: 10px;
    align-items: center;
    flex-shrink: 0;
  }
  #user-input {
    flex: 1;
    border: 1.5px solid #e2e8f0;
    border-radius: 12px;
    padding: 10px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13.5px;
    color: var(--ink);
    outline: none;
    resize: none;
    min-height: 42px;
    max-height: 100px;
    overflow-y: auto;
    transition: border-color 0.2s;
    background: #f8fafc;
  }
  #user-input:focus { border-color: var(--sky); background: white; }
  #user-input::placeholder { color: #94a3b8; }

  #send-btn {
    width: 42px; height: 42px; border-radius: 12px;
    background: linear-gradient(135deg, var(--sky), var(--earth));
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.2s, opacity 0.2s;
    flex-shrink: 0;
  }
  #send-btn:hover { transform: scale(1.08); }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  #send-btn svg { width: 18px; height: 18px; }

  /* powered by */
  .powered-by {
    text-align: center;
    padding: 6px 0 10px;
    font-size: 10.5px;
    color: #94a3b8;
    letter-spacing: 0.3px;
  }
  .powered-by span { color: var(--sky-dark); font-weight: 500; }

  @media (max-width: 440px) {
    #chat-window { right: 12px; left: 12px; width: auto; bottom: 96px; }
    #fab { bottom: 20px; right: 20px; }
  }
</style>
</head>
<body>

<!-- <div class="demo-label">MightyBreeze — Chatbot Widget Demo</div> -->

<!-- FAB -->
<button id="fab" aria-label="Open chat">
  <svg class="ico-chat" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
  </svg>
  <svg class="ico-close" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round">
    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
  </svg>
</button>

<!-- Chat Window -->
<div id="chat-window" role="dialog" aria-label="MightyBreeze Assistant">
  <div class="chat-header">
    <div class="chat-avatar">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2a10 10 0 100 20A10 10 0 0012 2z"/>
        <path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/>
      </svg>
    </div>
    <div class="chat-header-info">
      <div class="chat-header-name">Breeze Assistant</div>
      <div class="chat-header-status">
        <span class="status-dot"></span> Online · MightyBreeze
      </div>
    </div>
  </div>

  <div class="chat-messages" id="messages"></div>

  <div class="chat-input-bar">
    <textarea id="user-input" rows="1" placeholder="Type your message…"></textarea>
    <button id="send-btn" aria-label="Send message" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
  <div class="powered-by">Powered by <span>Claude AI</span> · MightyBreeze © 2025</div>
</div>

<script>
const fab = document.getElementById('fab');
const chatWindow = document.getElementById('chat-window');
const messagesEl = document.getElementById('messages');
const userInput = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');

let isOpen = false;
let isWaiting = false;
let conversationHistory = [];
let greeted = false;

// Toggle chat
fab.addEventListener('click', () => {
  isOpen = !isOpen;
  fab.classList.toggle('open', isOpen);
  chatWindow.classList.toggle('open', isOpen);
  if (isOpen && !greeted) {
    greeted = true;
    setTimeout(() => greet(), 400);
  }
  if (isOpen) setTimeout(() => userInput.focus(), 350);
});

// Input events
userInput.addEventListener('input', () => {
  sendBtn.disabled = userInput.value.trim() === '' || isWaiting;
  userInput.style.height = 'auto';
  userInput.style.height = Math.min(userInput.scrollHeight, 100) + 'px';
});
userInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
sendBtn.addEventListener('click', send);

function scrollBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function addMsg(role, text) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  if (role === 'bot') {
    div.innerHTML = `
      <div class="msg-avatar">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/>
          <line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/>
        </svg>
      </div>
      <div class="bubble">${formatText(text)}</div>`;
  } else {
    div.innerHTML = `<div class="bubble">${formatText(text)}</div>`;
  }

  messagesEl.appendChild(div);
  scrollBottom();
  return div;
}

function formatText(t) {
  return t
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
}

function addQuickReplies(options) {
  const div = document.createElement('div');
  div.className = 'quick-replies';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'qr';
    btn.textContent = opt;
    btn.addEventListener('click', () => {
      div.remove();
      handleUserMessage(opt);
    });
    div.appendChild(btn);
  });
  messagesEl.appendChild(div);
  scrollBottom();
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'typing-indicator';
  div.id = 'typing';
  div.innerHTML = `
    <div class="msg-avatar">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/>
        <line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/>
      </svg>
    </div>
    <div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  messagesEl.appendChild(div);
  scrollBottom();
}

function hideTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

function greet() {
  addMsg('bot', "👋 Hi there! I'm **Breeze**, your MightyBreeze assistant.\n\nHow can I help you today?");
  addQuickReplies([
    '💧 Borehole Drilling',
    '☀️ Solar Installation',
    '🌱 Irrigation Systems',
    '⛽ Bush Pumps',
    '📞 Get a Quote',
  ]);
}

async function send() {
  const text = userInput.value.trim();
  if (!text || isWaiting) return;
  userInput.value = '';
  userInput.style.height = 'auto';
  sendBtn.disabled = true;
  handleUserMessage(text);
}

async function handleUserMessage(text) {
  addMsg('user', text);
  conversationHistory.push({ role: 'user', content: text });

  isWaiting = true;
  sendBtn.disabled = true;
  showTyping();

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: `You are Breeze, the friendly and knowledgeable AI assistant for MightyBreeze — a professional borehole drilling, solar installation, irrigation, and bush pump company based in Zimbabwe.

Company info:
- Services: Borehole Drilling, Solar Installation (home & borehole), Irrigation Systems, Bush Pumps
- Experience: 14+ years
- Contact: +263 77 106 0581, +263 71 899 5907, +263 77 246 6985
- Hours: Mon–Sat 8:00–17:30, Sunday CLOSED
- Website: mightybreeze.co.zw

Your role:
- Help visitors understand services and choose the right solution
- Collect leads (name, location, service needed, phone number) naturally in conversation
- Answer questions about borehole depth, solar sizing, irrigation setup, maintenance
- Give rough timeframes and explain what factors affect pricing
- Be warm, concise, and professional — like a helpful salesperson, not a robot
- Suggest contacting the team for detailed quotes
- When a user provides their details, confirm you'll pass them on to the team
- Keep responses short (2–4 sentences max unless explaining something technical)
- Use occasional relevant emojis to keep things friendly
- Never make up specific prices — say pricing depends on site assessment`,
        messages: conversationHistory,
      }),
    });

    const data = await response.json();
    hideTyping();

    const reply = data.content?.[0]?.text || "Sorry, I had a hiccup. Please try again or call us on +263 77 106 0581.";
    conversationHistory.push({ role: 'assistant', content: reply });
    addMsg('bot', reply);

    // Contextual quick replies after first AI response
    if (conversationHistory.length <= 4) {
      addQuickReplies(['📍 Site Visit Request', '💰 Cost Estimate', '⏱️ How long does it take?', '📞 Call Now']);
    }

  } catch (err) {
    hideTyping();
    addMsg('bot', "Oops, something went wrong on my end. Please call us directly on **+263 77 106 0581** and we'll help you right away! 📞");
  }

  isWaiting = false;
  sendBtn.disabled = userInput.value.trim() === '';
}
</script>
</body>
</html>
